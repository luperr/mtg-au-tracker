services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mtg_tracker
      POSTGRES_USER: mtg
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data  # persists DB data between restarts
    ports:
      - "5432:5432"                      # exposes postgres on your Mac at localhost:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mtg"]
      interval: 5s
      retries: 5

  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app                          # your code folder, live-mounted
      - node_modules:/app/node_modules  # deps cached in Docker, not on your Mac
    working_dir: /app
    environment:
      DATABASE_URL: postgresql://mtg:${DB_PASSWORD}@db:5432/mtg_tracker
      EBAY_CLIENT_ID: ${EBAY_CLIENT_ID}
      EBAY_CLIENT_SECRET: ${EBAY_CLIENT_SECRET}
      EBAY_ENV: ${EBAY_ENV:-production}
      EBAY_PAGES_PER_SET: ${EBAY_PAGES_PER_SET:-5}
      EBAY_PAGES_PER_CARD: ${EBAY_PAGES_PER_CARD:-1}
      EBAY_RECENT_MONTHS: ${EBAY_RECENT_MONTHS:-12}
      EBAY_HIGH_VALUE_USD: ${EBAY_HIGH_VALUE_USD:-10}
    depends_on:
      db:
        condition: service_healthy      # wait for postgres to be ready before starting

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: sh -c "pnpm install && pnpm --filter @mtg-au/web dev"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    working_dir: /app
    ports:
      - "3000:3000"                     # Next.js dev server on your Mac at localhost:3000
    environment:
      DATABASE_URL: postgresql://mtg:${DB_PASSWORD}@db:5432/mtg_tracker
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy

volumes:
  node_modules:
  pgdata:
